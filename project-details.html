<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Dynamic Title - Will be updated by JavaScript -->
    <title id="dynamicProjectTitle">Project Details - Md. Asifuzzaman</title>
    <meta name="description" id="dynamicProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman including technologies, features, and implementation details.">
    <meta name="keywords"
        content="Project Details, Software Project, Code Implementation, GitHub Repository, Live Demo">
    <meta name="author" content="Md. Asifuzzaman">
    <meta name="robots" content="index, follow">

    <!-- Canonical URL - Dynamic with ID -->
    <link rel="canonical" href="https://asifxasif.github.io/project-details.html">

    <!-- Open Graph / Facebook - Will be updated by JavaScript -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://asifxasif.github.io/project-details.html">
    <meta property="og:title" id="ogProjectTitle" content="Project Details - Md. Asifuzzaman">
    <meta property="og:description" id="ogProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman.">
    <meta property="og:image" content="https://asifxasif.github.io/assets/og-image-project.webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Md. Asifuzzaman Portfolio">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://asifxasif.github.io/project-details.html">
    <meta name="twitter:title" id="twitterProjectTitle" content="Project Details - Md. Asifuzzaman">
    <meta name="twitter:description" id="twitterProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman.">
    <meta name="twitter:image" content="https://asifxasif.github.io/assets/og-image-project.webp">

    <!-- Theme Color -->
    <meta name="theme-color" content="#ff2a2a">

    <!-- Icons & Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Stylesheets -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" media="print"
        onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <link rel="stylesheet" href="style.css">

    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>

    <!-- JavaScript to update meta tags dynamically -->
    <script>
        // This function will be called when project data is loaded
        function updateProjectMetaTags(project) {
            if (!project) return;

            // Update title
            document.title = `${project.title} - Project Details | Md. Asifuzzaman`;

            // Update meta description
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute('content', project.description.substring(0, 160));
            }

            // Update Open Graph tags
            const ogTitle = document.getElementById('ogProjectTitle');
            if (ogTitle) ogTitle.setAttribute('content', `${project.title} - Project by Md. Asifuzzaman`);

            const ogDesc = document.getElementById('ogProjectDescription');
            if (ogDesc) ogDesc.setAttribute('content', project.description.substring(0, 160));

            // Update Twitter tags
            const twitterTitle = document.getElementById('twitterProjectTitle');
            if (twitterTitle) twitterTitle.setAttribute('content', `${project.title} - Project by Md. Asifuzzaman`);

            const twitterDesc = document.getElementById('twitterProjectDescription');
            if (twitterDesc) twitterDesc.setAttribute('content', project.description.substring(0, 160));
        }
    </script>

    <style>
        .project-details-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            overflow-x: hidden;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .project-header-section {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.9);
            margin-bottom: 30px;
        }

        .project-category-tag {
            display: inline-block;
            padding: 8px 20px;
            background: black;
            color: white;
            border-radius: 20px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .project-header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .project-meta-info {
            display: flex;
            gap: 25px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-item i {
            color: var(--accent-red);
            font-size: 14px;
        }

        .project-overview {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .project-content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 50px;
            width: 100%;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }

        .project-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.9);
            width: 100%;
            box-sizing: border-box;
        }

        .project-section h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid black;
        }

        .section-content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            width: 100%;
            overflow-x: hidden;
        }

        .tech-stack-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
            width: 100%;
        }

        .tech-tag-detailed {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            white-space: normal;
            word-break: break-word;
        }

        .feature-list {
            list-style: none;
            padding-left: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .feature-list li {
            position: relative;
            padding-left: 25px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: normal;
        }

        .feature-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--accent-red);
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            width: 100%;
            box-sizing: border-box;
        }

        .stat-card .number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .project-links-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .project-link-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            white-space: normal;
            word-break: break-word;
        }

        .project-link-btn.primary {
            background: black;
            color: white;
        }

        .project-link-btn.primary:hover {
            background: var(--accent-red);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 42, 42, 0.3);
        }

        .project-link-btn.secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1.5px solid black;
        }

        .project-link-btn.secondary:hover {
            background: black;
            color: white;
            transform: translateY(-3px);
        }

        .project-team-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .team-member {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        .member-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: black;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .member-info {
            min-width: 0;
            flex: 1;
        }

        .member-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 3px;
            word-wrap: break-word;
            white-space: normal;
        }

        .member-info p {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            word-wrap: break-word;
            white-space: normal;
        }

        .detail-list {
            list-style: none;
            padding-left: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .detail-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: normal;
        }

        .detail-list li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-red);
            font-size: 20px;
            line-height: 1;
        }

        .back-to-projects {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 25px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-bottom: 50px;
        }

        .back-to-projects:hover {
            background: var(--accent-red);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 42, 42, 0.3);
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f0f0f0;
            border-top: 3px solid var(--accent-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .project-image-placeholder {
            width: 100%;
            height: 300px;
            background: linear-gradient(45deg, #f0f0f0, #e0e5ec);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .project-image-placeholder i {
            font-size: 48px;
            color: #ccc;
        }

        .project-images-section {
            margin-top: 20px;
            width: 100%;
        }

        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 15px;
            width: 100%;
        }

        .gallery-item {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            width: 100%;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .image-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover .image-container img {
            transform: scale(1.05);
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #999;
            background: #f0f0f0;
        }

        .image-placeholder i {
            font-size: 40px;
            margin-bottom: 10px;
            color: #ccc;
        }

        .image-placeholder span {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .image-caption {
            padding: 12px 15px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            background: white;
            border-top: 1px solid #f0f0f0;
            word-wrap: break-word;
            white-space: normal;
        }

        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: hidden;
        }

        .lightbox-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            transition: color 0.3s ease;
        }

        .lightbox-close:hover {
            color: var(--accent-red);
        }

        .lightbox-image-container {
            max-width: 90%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-image-container img {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
        }

        .lightbox-caption {
            color: white;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            letter-spacing: 0.5px;
            word-wrap: break-word;
            white-space: normal;
            max-width: 90%;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }

        .lightbox-nav:hover {
            background: var(--accent-red);
            color: white;
        }

        .lightbox-nav.prev {
            left: 30px;
        }

        .lightbox-nav.next {
            right: 30px;
        }

        .lightbox-nav i {
            font-size: 30px;
        }

        .image-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            letter-spacing: 1px;
            z-index: 1001;
        }

        @media (max-width: 1024px) {
            .project-content-grid {
                grid-template-columns: 1fr;
            }

            .project-header-section h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 768px) {
            .project-details-container {
                padding: 0 10px;
            }

            .project-header-section {
                padding: 25px;
                width: 100%;
                box-sizing: border-box;
            }

            .project-section {
                padding: 25px;
                width: 100%;
                box-sizing: border-box;
            }

            .project-header-section h1 {
                font-size: 1.8rem;
                word-wrap: break-word;
            }

            .project-meta-info {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .meta-item {
                flex-wrap: wrap;
                word-break: break-word;
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                width: 100%;
                gap: 15px;
            }

            .image-gallery {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
                width: 100%;
            }

            .image-container {
                height: 150px;
                width: 100%;
            }

            .project-content-grid {
                width: 100%;
                overflow-x: hidden;
            }

            .main-content,
            .sidebar-content {
                width: 100%;
                overflow-x: hidden;
            }

            .tech-stack-details {
                flex-wrap: wrap;
                width: 100%;
                gap: 8px;
            }

            .tech-tag-detailed {
                white-space: normal;
                word-break: break-word;
                max-width: 100%;
            }

            .project-links-section {
                width: 100%;
            }

            .project-link-btn {
                width: 100%;
                box-sizing: border-box;
                white-space: normal;
                word-break: break-word;
            }

            .project-team-section {
                width: 100%;
            }

            .team-member {
                width: 100%;
                box-sizing: border-box;
            }

            .feature-list,
            .detail-list {
                padding-left: 0;
                width: 100%;
                box-sizing: border-box;
            }

            .feature-list li,
            .detail-list li {
                word-wrap: break-word;
                white-space: normal;
            }

            .stat-card {
                width: 100%;
                box-sizing: border-box;
            }

            .lightbox-nav {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .lightbox-nav.prev {
                left: 15px;
            }

            .lightbox-nav.next {
                right: 15px;
            }

            .lightbox-close {
                top: 20px;
                right: 25px;
                font-size: 30px;
            }
        }

        @media (max-width: 480px) {
            .project-details-container {
                padding: 0 8px;
            }

            .project-header-section,
            .project-section {
                padding: 20px;
                border-radius: 20px;
                width: 100%;
                box-sizing: border-box;
            }

            .project-header-section h1 {
                font-size: 1.5rem;
                word-wrap: break-word;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .project-link-btn {
                padding: 12px 20px;
                font-size: 11px;
                width: 100%;
                box-sizing: border-box;
            }

            .tech-tag-detailed {
                padding: 6px 12px;
                font-size: 10px;
            }

            .feature-list li {
                font-size: 13px;
                padding-left: 20px;
                word-wrap: break-word;
            }

            .image-gallery {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .image-container {
                height: 200px;
                width: 100%;
            }

            .lightbox-nav {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .lightbox-nav.prev {
                left: 10px;
            }

            .lightbox-nav.next {
                right: 10px;
            }

            .lightbox-close {
                top: 15px;
                right: 20px;
                font-size: 25px;
            }

            .project-meta-info {
                gap: 10px;
            }

            .meta-item {
                flex-wrap: wrap;
                word-break: break-word;
                font-size: 11px;
            }

            .section-content {
                width: 100%;
                overflow-x: hidden;
                font-size: 13px;
            }

            .member-info h4,
            .member-info p {
                word-wrap: break-word;
                white-space: normal;
            }

            .image-caption {
                word-wrap: break-word;
                white-space: normal;
                font-size: 11px;
                padding: 10px 12px;
            }

            .back-to-projects {
                padding: 10px 20px;
                font-size: 10px;
            }
        }
    </style>
</head>

    <script>
        // Animation Script - FIXED VERSION
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let particleCount;

        // Define Particle class FIRST before it's used
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0,0,0,1)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Update particle count based on screen size
            particleCount = window.innerWidth < 768 ? 30 : 100;

            // Recreate particles to fit new canvas size
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.zIndex = '-1';
        canvas.style.pointerEvents = 'none';
        document.body.appendChild(canvas);

        // Debounced resize handler
        let resizeTimeout;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function () {
                requestAnimationFrame(resizeCanvas);
            }, 100);
        });

        window.addEventListener('orientationchange', function () {
            setTimeout(function () {
                requestAnimationFrame(resizeCanvas);
            }, 150);
        });

        // Initial resize
        resizeCanvas();

        function connect() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(0,0,0,${1 - dist / 300})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            connect();
            requestAnimationFrame(animate);
        }
        animate();

        // Force a resize after a short delay
        setTimeout(function () {
            requestAnimationFrame(resizeCanvas);
        }, 500);

        // Periodic check for canvas size (every 2 seconds)
        setInterval(function () {
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                requestAnimationFrame(resizeCanvas);
            }
        }, 2000);

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
            const hamburger = document.querySelector('.hamburger-menu');
            hamburger.classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger-menu');
            if (!e.target.closest('.nav-links') && !e.target.closest('.hamburger-menu')) {
                navLinks.classList.remove('active');
                hamburger.classList.remove('active');
            }
        });
    </script>
    <script>
        let currentImages = [];
        let currentImageIndex = 0;

        function openLightbox(images, index) {
            const modal = document.getElementById('lightboxModal');
            const lightboxImg = document.getElementById('lightboxImage');
            const lightboxCaption = document.getElementById('lightboxCaption');
            const imageCounter = document.getElementById('imageCounter');

            modal.style.display = 'block';
            currentImageIndex = index;
            currentImages = images;

            updateLightboxImage();
        }

        function updateLightboxImage() {
            const lightboxImg = document.getElementById('lightboxImage');
            const lightboxCaption = document.getElementById('lightboxCaption');
            const imageCounter = document.getElementById('imageCounter');

            if (currentImages && currentImages[currentImageIndex]) {
                lightboxImg.src = currentImages[currentImageIndex].url;
                lightboxCaption.textContent = currentImages[currentImageIndex].caption;
                imageCounter.textContent = `${currentImageIndex + 1} / ${currentImages.length}`;
            }
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        function navigateLightbox(direction) {
            if (!currentImages) return;

            currentImageIndex += direction;

            if (currentImageIndex < 0) {
                currentImageIndex = currentImages.length - 1;
            } else if (currentImageIndex >= currentImages.length) {
                currentImageIndex = 0;
            }

            updateLightboxImage();
        }

        function getProjectIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('id'));
        }

        function findProjectById(projectId) {
            return projectsData.find(project => project.id === projectId);
        }

        function renderProjectDetails(project) {
            if (!project) {
                return '<div class="loading-container"><div class="loading-spinner"></div><p>Project not found</p></div>';
            }

            const categoryColors = {
                'web': 'var(--accent-red)',
                'mobile': '#00a86b',
                'ai': '#8e2de2',
                'system': '#f46b45',
                'network': '#4a00e0',
                'testing': '#000428',
                'algorithms': '#4a90e2'
            };

            const categoryColor = categoryColors[project.categories[0]] || 'black';

            let teamMembersHTML = '';
            if (project.details && project.details.team) {
                const team = project.details.team;
                if (typeof team === 'object') {
                    Object.keys(team).forEach(role => {
                        teamMembersHTML += `
                    <div class="team-member">
                        <div class="member-avatar">${role.charAt(0)}</div>
                        <div class="member-info">
                            <h4>${team[role]}</h4>
                            <p>${role}</p>
                        </div>
                    </div>
                `;
                    });
                } else if (typeof team === 'string') {
                    const teamArray = team.split(', ');
                    teamArray.forEach(member => {
                        const initials = member.split(' ').map(n => n.charAt(0)).join('');
                        teamMembersHTML += `
                    <div class="team-member">
                        <div class="member-avatar">${initials}</div>
                        <div class="member-info">
                            <h4>${member}</h4>
                            <p>Team Member</p>
                        </div>
                    </div>
                `;
                    });
                }
            }

            let featuresHTML = '';
            if (project.features && Array.isArray(project.features)) {
                project.features.forEach(feature => {
                    featuresHTML += `<li>${feature}</li>`;
                });
            }

            let technologiesHTML = '';
            if (project.tech && Array.isArray(project.tech)) {
                project.tech.forEach(tech => {
                    technologiesHTML += `<span class="tech-tag-detailed">${tech}</span>`;
                });
            }

            let statsHTML = '';
            if (project.stats) {
                Object.keys(project.stats).forEach((key, index) => {
                    if (index < 3) {
                        statsHTML += `
                    <div class="stat-card">
                        <div class="number">${project.stats[key]}</div>
                        <div class="label">${key.replace(/([A-Z])/g, ' $1').toUpperCase()}</div>
                    </div>
                `;
                    }
                });
            }

            let imagesHTML = '';
            if (project.images && project.images.length > 0) {
                imagesHTML = `
                <div class="project-section">
                    <h2>PROJECT GALLERY</h2>
                    <div class="project-images-section">
                        <div class="image-gallery">
                `;

                project.images.forEach((image, index) => {
                    if (image.url) {
                        imagesHTML += `
                    <div class="gallery-item" onclick='openLightbox(${JSON.stringify(project.images).replace(/'/g, "\\'")}, ${index})'>
                        <div class="image-container">
                            <img src="${image.url}" alt="${image.caption}" loading="lazy">
                        </div>
                        <div class="image-caption">${image.caption}</div>
                    </div>
                        `;
                    } else {
                        imagesHTML += `
                    <div class="gallery-item">
                        <div class="image-container">
                            <div class="image-placeholder">
                                <i class="fa-solid fa-image"></i>
                                <span>${image.caption || 'Image'}</span>
                            </div>
                        </div>
                        <div class="image-caption">${image.caption || 'Image'}</div>
                    </div>
                        `;
                    }
                });

                imagesHTML += `
                        </div>
                    </div>
                </div>
                `;
            }

            let detailsSections = '';
            if (project.details) {
                Object.keys(project.details).forEach(sectionKey => {
                    if (sectionKey !== 'team' && sectionKey !== 'id') {
                        let sectionContent = '';
                        const sectionData = project.details[sectionKey];

                        if (typeof sectionData === 'string') {
                            sectionContent = `<p>${sectionData}</p>`;
                        } else if (Array.isArray(sectionData)) {
                            sectionContent = '<ul class="detail-list">';
                            sectionData.forEach(item => {
                                if (typeof item === 'string') {
                                    sectionContent += `<li>${item}</li>`;
                                } else if (typeof item === 'object') {
                                    sectionContent += `<li><strong>${Object.keys(item)[0]}:</strong> ${Object.values(item)[0]}</li>`;
                                }
                            });
                            sectionContent += '</ul>';
                        } else if (typeof sectionData === 'object') {
                            sectionContent = '<ul class="detail-list">';
                            Object.keys(sectionData).forEach(subKey => {
                                sectionContent += `<li><strong>${subKey.replace(/_/g, ' ').toUpperCase()}:</strong> ${sectionData[subKey]}</li>`;
                            });
                            sectionContent += '</ul>';
                        }

                        if (sectionContent) {
                            detailsSections += `
                        <div class="project-section">
                            <h2>${sectionKey.replace(/([A-Z])/g, ' $1').toUpperCase()}</h2>
                            <div class="section-content">
                                ${sectionContent}
                            </div>
                        </div>
                    `;
                        }
                    }
                });
            }

            const sourceCodeLink = project.links?.sourceCode || '#';
            const liveDemoLink = project.links?.liveDemo;
            const documentationLink = project.links?.documentation || '#';

            let liveDemoButton = '';
            if (liveDemoLink) {
                liveDemoButton = `
                <a href="${liveDemoLink}" class="project-link-btn secondary" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-external-link-alt"></i>
                    <span>Live Demo</span>
                </a>
            `;
            }

            return `
            <div class="project-header-section">
                <span class="project-category-tag" style="background: ${categoryColor};">${project.category}</span>
                <h1>${project.title}</h1>
                
                <div class="project-meta-info">
                    <div class="meta-item">
                        <i class="fa-solid fa-calendar"></i>
                        <span>${project.date}</span>
                    </div>
                    <div class="meta-item">
                        <i class="fa-solid fa-users"></i>
                        <span>Team: ${project.team}</span>
                    </div>
                    <div class="meta-item">
                        <i class="fa-solid fa-code"></i>
                        <span>${project.tech.length} Technologies</span>
                    </div>
                </div>
                
                <p class="project-overview">${project.description}</p>
                
                <div class="tech-stack-details">
                    ${technologiesHTML}
                </div>
            </div>
            
            <div class="project-content-grid">
                <div class="main-content">
                    ${detailsSections || `
                        <div class="project-section">
                            <h2>PROJECT OVERVIEW</h2>
                            <div class="section-content">
                                <p>${project.description}</p>
                            </div>
                        </div>
                        
                        <div class="project-section">
                            <h2>KEY FEATURES</h2>
                            <div class="section-content">
                                <ul class="feature-list">
                                    ${featuresHTML}
                                </ul>
                            </div>
                        </div>
                    `}
                    
                    ${statsHTML ? `
                        <div class="project-section">
                            <h2>PROJECT STATISTICS</h2>
                            <div class="section-content">
                                <div class="stats-grid">
                                    ${statsHTML}
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
                
                <div class="sidebar-content">
                    <div class="project-section">
                        <h2>PROJECT LINKS</h2>
                        <div class="project-links-section">
                            <a href="${sourceCodeLink}" class="project-link-btn primary" ${sourceCodeLink !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}>
                                <i class="fa-brands fa-github"></i>
                                <span>View Source Code</span>
                            </a>
                            ${liveDemoButton}
                            <a href="${documentationLink}" class="project-link-btn secondary" ${documentationLink !== '#' ? 'target="_blank" rel="noopener noreferrer"' : ''}>
                                <i class="fa-solid fa-file-pdf"></i>
                                <span>Documentation</span>
                            </a>
                        </div>
                    </div>
                    
                    ${teamMembersHTML ? `
                        <div class="project-section">
                            <h2>PROJECT TEAM</h2>
                            <div class="project-team-section">
                                ${teamMembersHTML}
                            </div>
                        </div>
                    ` : ''}
                    
                    <div class="project-section">
                        <h2>PROJECT INFO</h2>
                        <div class="section-content">
                            <div class="meta-item">
                                <i class="fa-solid fa-layer-group"></i>
                                <span>Category: ${project.category}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fa-solid fa-tags"></i>
                                <span>Tags: ${project.categories.join(', ')}</span>
                            </div>
                            <div class="meta-item">
                                <i class="fa-solid fa-calendar-check"></i>
                                <span>Completed: ${project.date}</span>
                            </div>
                        </div>
                    </div>
                    
                    ${imagesHTML}
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 40px;">
                <a href="projects.html" class="back-to-projects">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to All Projects
                </a>
            </div>

            <div id="lightboxModal" class="lightbox-modal">
                <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
                <button class="lightbox-nav prev" onclick="navigateLightbox(-1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button class="lightbox-nav next" onclick="navigateLightbox(1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <div class="lightbox-content">
                    <div class="lightbox-image-container">
                        <img id="lightboxImage" src="" alt="">
                        <div id="lightboxCaption" class="lightbox-caption"></div>
                    </div>
                </div>
                <div id="imageCounter" class="image-counter"></div>
            </div>
        `;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const projectId = getProjectIdFromURL();
            const project = findProjectById(projectId);
            const container = document.getElementById('projectDetailsContainer');

            container.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><p>Loading project details...</p></div>';

            setTimeout(() => {
                container.innerHTML = renderProjectDetails(project);
                if (project) {
                    document.title = `${project.title} - Project Details | Md. Asifuzzaman`;
                }
            }, 500);
        });

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
            const hamburger = document.querySelector('.hamburger-menu');
            hamburger.classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            const navLinks = document.querySelector('.nav-links');
            const hamburger = document.querySelector('.hamburger-menu');
            if (!e.target.closest('.nav-links') && !e.target.closest('.hamburger-menu')) {
                navLinks.classList.remove('active');
                hamburger.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightboxModal').style.display === 'block') {
                if (e.key === 'Escape') {
                    closeLightbox();
                } else if (e.key === 'ArrowLeft') {
                    navigateLightbox(-1);
                } else if (e.key === 'ArrowRight') {
                    navigateLightbox(1);
                }
            }
        });
    </script>
</body>
