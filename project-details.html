<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Dynamic Title - Will be updated by JavaScript -->
    <title id="dynamicProjectTitle">Project Details - Md. Asifuzzaman</title>
    <meta name="description" id="dynamicProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman including technologies, features, and implementation details.">
    <meta name="keywords"
        content="Project Details, Software Project, Code Implementation, GitHub Repository, Live Demo">
    <meta name="author" content="Md. Asifuzzaman">
    <meta name="robots" content="index, follow">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://asifxasif.github.io/Portfolio/project-details.html">

    <!-- Open Graph / Facebook -->
    <meta property="fb:app_id" content="966242223397117" />
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://asifxasif.github.io/Portfolio/project-details.html">
    <meta property="og:title" id="ogProjectTitle" content="Project Details - Md. Asifuzzaman">
    <meta property="og:description" id="ogProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman.">
    <meta property="og:image" content="https://asifxasif.github.io/Portfolio/assets/og-image.webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Md. Asifuzzaman Portfolio">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://asifxasif.github.io/Portfolio/project-details.html">
    <meta name="twitter:title" id="twitterProjectTitle" content="Project Details - Md. Asifuzzaman">
    <meta name="twitter:description" id="twitterProjectDescription"
        content="Detailed information about software engineering projects by Md. Asifuzzaman.">
    <meta name="twitter:image" content="https://asifxasif.github.io/Portfolio/assets/og-image.webp">

    <!-- Theme Color -->
    <meta name="theme-color" content="#ff2a2a">

    <!-- Icons & Favicon -->
    <link rel="icon" type="image/x-icon" href="/Portfolio/assets/favicon.ico">
    <link rel="apple-touch-icon" href="/Portfolio/assets/apple-touch-icon.png">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Stylesheets -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" media="print"
        onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <link rel="stylesheet" href="style.css">

    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>

    <!-- JavaScript to update meta tags dynamically -->
    <script>
        function updateProjectMetaTags(project) {
            if (!project) return;

            document.title = `${project.title} - Project Details | Md. Asifuzzaman`;

            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute('content', project.description.substring(0, 160));
            }

            const ogTitle = document.getElementById('ogProjectTitle');
            if (ogTitle) ogTitle.setAttribute('content', `${project.title} - Project by Md. Asifuzzaman`);

            const ogDesc = document.getElementById('ogProjectDescription');
            if (ogDesc) ogDesc.setAttribute('content', project.description.substring(0, 160));

            const twitterTitle = document.getElementById('twitterProjectTitle');
            if (twitterTitle) twitterTitle.setAttribute('content', `${project.title} - Project by Md. Asifuzzaman`);

            const twitterDesc = document.getElementById('twitterProjectDescription');
            if (twitterDesc) twitterDesc.setAttribute('content', project.description.substring(0, 160));
        }
    </script>
</head>

<body>
    <div class="main-container">
        <a href="javascript:history.back()" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Go Back
        </a>

        <div class="project-details-container" id="projectDetailsContainer">
        </div>

        <!-- Scroll Animation Indicator -->
        <div id="scrollAnimation" class="scroll-animation">
            <img id="scrollAnimationImg" alt="Scroll Animation">
        </div>
    </div>

    <!-- Back to Top Button -->
    <button id="backToTop" class="back-to-top" aria-label="Back to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>

</html>
